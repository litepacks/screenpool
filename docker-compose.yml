services:
  screenpool:
    build: .
    image: screenpool:latest
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      SCREENPOOL_OUTPUT_DIR: /data
    volumes:
      - screenpool-data:/data
    deploy:
      resources:
        limits:
          memory: 768M
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  screenpool-data:
